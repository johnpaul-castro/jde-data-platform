version: '3.8'

x-airflow-common: &airflow-common
  build: .
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://jp:jp@postgres:5432/jde_dw
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__SECRET_KEY: 'jde_demo_secret'
    NODE_PATH: /home/airflow/extractor_modules/node_modules
    DBT_LOG_PATH: /home/airflow/dbt_logs
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./dbt:/opt/airflow/dbt
    - ./extractors:/opt/airflow/extractors
  networks:
    - jde_network
  depends_on:
    - postgres

services:
  postgres:
    image: postgres:16
    container_name: jde_postgres
    environment:
      POSTGRES_USER: jp
      POSTGRES_PASSWORD: jp
      POSTGRES_DB: jde_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jde_network

  airflow-init:
    <<: *airflow-common
    container_name: jde_airflow_init
    command: db migrate
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: jde_airflow
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: jde_airflow_scheduler
    command: scheduler
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  jde_network:
    driver: bridge
